<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Planner 5D Studio | AIT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

/* Banner */
.banner {
  width: 100%;
  height: 250px;
  background: linear-gradient(135deg, #000, #002b1a);
  display: flex;
  align-items: center;
  justify-content: center;
}

.banner h1 {
  color: #00ffae;
  font-size: 2.5rem;
}

/* Container */
.container {
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
}

/* Card */
.card {
  background: #111;
  border-radius: 12px;
  border: 1px solid #00ffae;
  box-shadow: 0 0 20px rgba(0, 255, 174, 0.2);
  padding: 20px;
  text-align: center;
}

.card img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  margin-bottom: 15px;
}

.card h2 {
  color: #00ffae;
}

.card p {
  color: #ccc;
  font-size: 14px;
  text-align: left;
}

/* Button */
button {
  margin-top: 20px;
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  background: #00ffae;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- Banner -->
<div class="banner">
  <h1>5D Design Planner</h1>
</div>

<!-- Planner 5D Card -->
<div class="container">
  <div class="card">
    <img src="https://planner5d.com/favicon.ico">
    <h2>Planner 5D</h2>
    <p>
      A powerful home and interior design tool that allows you to create floor plans, 
      design rooms, and visualize buildings in 2D and 3D. Perfect for civil engineering, 
      architecture, and construction planning.
    </p>

    <button onclick="window.open('https://planner5d.com/','_blank')">
      Open Planner 5D
    </button>
  </div>
</div>

</body>
</html>
