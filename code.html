<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Code Studio | AIT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

/* Banner */
.banner {
  width: 100%;
  height: 250px;
  background: linear-gradient(135deg, #000, #001a33);
  display: flex;
  align-items: center;
  justify-content: center;
}

.banner h1 {
  color: #3aa0ff;
  font-size: 2.5rem;
}

/* Container */
.container {
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
}

/* Card */
.card {
  background: #111;
  border-radius: 12px;
  border: 1px solid #3aa0ff;
  box-shadow: 0 0 20px rgba(58, 160, 255, 0.2);
  padding: 20px;
  text-align: center;
}

.card img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  margin-bottom: 15px;
}

.card h2 {
  color: #3aa0ff;
}

.card p {
  color: #ccc;
  font-size: 14px;
  text-align: left;
}

/* Button */
button {
  margin-top: 20px;
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  background: #3aa0ff;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- Banner -->
<div class="banner">
  <h1>💻 Code Studio</h1>
</div>

<!-- VS Code Only -->
<div class="container">
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Visual_Studio_Code_1.35_icon.svg">
    <h2>Visual Studio Code</h2>
    <p>
      A powerful code editor supporting HTML, CSS, JavaScript, Python, and more. 
      Perfect for building real-world applications, debugging, and development.
    </p>
    <button onclick="window.open('https://vscode.dev/','_blank')">
      Open VS Code
    </button>
  </div>
</div>

</body>
</html>
