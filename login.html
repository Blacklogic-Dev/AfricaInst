<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Africa Institution of Technology – Login/Admission</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0a0a0a;
    color:#ff69b4;
    font-family:'Courier New',monospace;
}

.card{
    background:rgba(20,20,20,0.95);
    border-radius:16px;
    padding:2rem;
    max-width:520px;
    width:100%;
    box-shadow:0 0 20px #00ffff;
}

.toggle{
    display:flex;
    justify-content:center;
    margin-bottom:1rem;
}

.toggle button{
    padding:0.5rem 1.5rem;
    margin:0 0.5rem;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    background:#222;
    color:#ff69b4;
}

.toggle button.active{
    background:#ff69b4;
    color:#000;
}

.form-group{
    margin-bottom:1rem;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
}

.form-group input,
.form-group select{
    padding:0.6rem;
    border-radius:6px;
    border:none;
    background:#222;
    color:#ff69b4;
    width:100%;
}

button.submit{
    background:#ff69b4;
    color:#000;
    padding:0.8rem;
    border-radius:10px;
    font-weight:bold;
    width:100%;
    margin-top:5px;
}

button.download{
    background:#00ffff;
    color:#000;
    padding:0.8rem;
    border-radius:10px;
    font-weight:bold;
    width:100%;
    margin-top:5px;
}

pre.receipt{
    background:white;
    color:black;
    padding:1rem;
    border-radius:12px;
    margin-top:1rem;
}

#studentCardCanvas{
    display:block;
    margin:1rem auto;
    border:2px solid #00ffff;
    border-radius:12px;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="card text-center">

<img src="africai.jpg" width="150" class="mx-auto mb-4 rounded-lg"/>

<!-- Toggle -->
<div class="toggle">
    <button id="loginBtn" class="active">Login</button>
    <button id="admissionBtn">Admission</button>
</div>

<!-- LOGIN FORM -->
<form id="loginForm">
  <div class="form-group">
    <label>Student ID</label>
    <input type="text" id="studentID" required>
  </div>

  <div class="form-group" style="position:relative;">
    <label>Password</label>
    <input type="text" id="password" placeholder="Click generate" readonly required>
    <!-- Generate button inside form group -->
    <button type="button" id="generatePassword" 
            style="position:absolute; right:5px; top:28px; padding:0.3rem 0.6rem; border:none; border-radius:5px; background:#ff69b4; color:#000; cursor:pointer;">
      🔒 Generate
    </button>
  </div>

  <button type="button" class="submit" id="loginRedirect">Login</button>
</form>

<script>
// Password generator function
function generatePassword(length = 8) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
    let password = "";
    for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return password;
}

// Fill password field on button click
document.getElementById("generatePassword").addEventListener("click", () => {
    const passwordField = document.getElementById("password");
    passwordField.value = generatePassword(10); // 10-character password
});
</script>

<!-- ADMISSION FORM -->
<form id="admissionForm" style="display:none">

    <div class="form-group">
        <label>Name & Surname</label>
        <input type="text" id="fullName" required>
    </div>

    <div class="form-group">
        <label>ID Number</label>
        <input type="text" id="idNumber" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
    </div>

    <div class="form-group">
        <label>Physical Address</label>
        <input type="text" id="address" required>
    </div>

    <div class="form-group">
        <label>WhatsApp Number</label>
        <input type="text" id="whatsapp" required>
    </div>

    <!-- DEPARTMENT -->
    <div class="form-group">
        <label>Department</label>
        <select id="department">
            <option value="">Select Department</option>
            <option value="Software Development">Software Development & Engineering</option>
            <option value="Software Design">Software Design & Innovation</option>
            <option value="Construction">Construction Technology</option>
            <option value="AI Security">AI Investigation & Security</option>
        </select>
    </div>

    <!-- COURSE -->
    <div class="form-group" id="courseGroup" style="display:none">
        <label>Course</label>
        <select id="course"></select>
    </div>

    <!-- Upload for Student Card -->
    <div class="form-group">
        <label>Upload Student Photo</label>
        <input type="file" id="studentPhoto" accept="image/*">
    </div>

    <button type="button" id="downloadReceipt" class="download">
        Download Receipt
    </button>
    <button type="button" id="submitForm" class="submit" disabled>
        Submit Application
    </button>

</form>

<!-- Student Card Canvas -->
<canvas id="studentCardCanvas" width="400" height="250" style="display:none"></canvas>

<!-- Receipt -->
<pre id="receipt" class="receipt" style="display:none"></pre>

</div>

<script>
// Toggle login/admission forms
const loginBtn=document.getElementById("loginBtn");
const admissionBtn=document.getElementById("admissionBtn");
const loginForm=document.getElementById("loginForm");
const admissionForm=document.getElementById("admissionForm");

loginBtn.addEventListener("click",()=>{
    loginForm.style.display="block";
    admissionForm.style.display="none";
    loginBtn.classList.add("active");
    admissionBtn.classList.remove("active");
});

admissionBtn.addEventListener("click",()=>{
    loginForm.style.display="none";
    admissionForm.style.display="block";
    admissionBtn.classList.add("active");
    loginBtn.classList.remove("active");
});

// Courses per department
const department=document.getElementById("department");
const course=document.getElementById("course");
const courseGroup=document.getElementById("courseGroup");

const courses={
    "Software Development":["Frontend Development","Backend Development","Full Stack Development"],
    "Software Design":["Logo Design","Visual Design","Graphic Design"],
    "Construction":["Project Management Technology","Construction Technology (AutoCAD & Civil Engineering)"],
    "AI Security":["Office Security Technology","Admin Technologist","AI Investigation Technologist"]
};

department.addEventListener("change",function(){
    const selected=this.value;
    course.innerHTML="";
    if(selected===""){
        courseGroup.style.display="none";
        return;
    }
    courseGroup.style.display="block";
    courses[selected].forEach(c=>{
        const option=document.createElement("option");
        option.value=c;
        option.textContent=c;
        course.appendChild(option);
    });
});

// Login redirect
document.getElementById("loginRedirect").onclick=function(){
    const id=document.getElementById("studentID").value;
    const pw=document.getElementById("password").value;
    if(!id||!pw){ alert("Enter ID and Password"); return;}
    window.location.href="dashboard.html";
};

// Generate Receipt & enable submit
document.getElementById("downloadReceipt").onclick=function(){
    const name=document.getElementById("fullName").value;
    const id=document.getElementById("idNumber").value;
    const email=document.getElementById("email").value;
    const address=document.getElementById("address").value;
    const whatsapp=document.getElementById("whatsapp").value;
    const dep=department.value;
    const cou=course.value;

    if(!name||!id||!email||!address||!whatsapp||!dep||!cou){
        alert("Fill all fields");
        return;
    }

    const studentID="AIT-"+Math.floor(100000+Math.random()*900000);
    const password=id.slice(0,6);

    const receiptText=`
==============================
Africa Institution of Technology
==============================

Student ID: ${studentID}
Password: ${password}

Name: ${name}
Department: ${dep}
Course: ${cou}

Email: ${email}
WhatsApp: ${whatsapp}

==============================
`;

    const receipt=document.getElementById("receipt");
    receipt.textContent=receiptText;
    receipt.style.display="block";
    document.getElementById("submitForm").disabled=false;

    const {jsPDF}=window.jspdf;
    const doc=new jsPDF();
    doc.text(receiptText,10,10);
    doc.save("AIT_Admission_Receipt.pdf");

    // Generate student card if photo uploaded
    const photoInput=document.getElementById("studentPhoto");
    const canvas=document.getElementById("studentCardCanvas");
    if(photoInput.files.length>0){
        const ctx=canvas.getContext("2d");
        const img=new Image();
        img.onload=function(){
            ctx.fillStyle="#0a0a0a";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle="#00ffff";
            ctx.font="16px Courier New";
            ctx.fillText("Africa Institution of Technology",50,30);
            ctx.font="14px Courier New";
            ctx.fillText(`Student: ${name}`,20,60);
            ctx.fillText(`ID: ${studentID}`,20,85);
            ctx.fillText(`Department: ${dep}`,20,110);
            ctx.fillText(`Course: ${cou}`,20,135);
            // Draw photo
            ctx.drawImage(img,300,50,80,100);
            canvas.style.display="block";
        }
        img.src=URL.createObjectURL(photoInput.files[0]);
    }
};

// Submit to WhatsApp
document.getElementById("submitForm").onclick=function(){
    const message=encodeURIComponent(document.getElementById("receipt").textContent);
    window.open(`https://wa.me/27606614909?text=${message}`,"_blank");
    alert("Application Sent!");
    window.location.href="dashboard.html";
};
</script>

</body>
</html>
