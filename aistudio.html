<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIT AI Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: #fff;
}

/* HEADER */
.banner {
  padding: 30px;
  text-align: center;
  background: linear-gradient(135deg,#000,#1a0033);
}

.banner h1 {
  font-size: 2rem;
  background: linear-gradient(90deg,#ff4fd8,#6f5cff);
  -webkit-background-clip: text;
  color: transparent;
}

.banner p {
  color: #ccc;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 20px;
}

/* SELECT */
select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #1f2a48;
  color: #fff;
}

/* PROMPT */
textarea {
  width: 100%;
  height: 160px;
  margin-top: 20px;
  border-radius: 10px;
  border: none;
  background: #1f2a48;
  color: #fff;
  padding: 12px;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(90deg,#ff4fd8,#6f5cff);
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="banner">
  <h1>🚀 AI Studio</h1>
  <p>Select your course to generate a smart AI learning prompt</p>
</div>

<div class="container">

<!-- DEPARTMENT -->
<label>Department</label>
<select id="department" onchange="loadCourses()">
  <option value="">Select Department</option>
  <option value="construction">Construction Technology</option>
  <option value="design">Software Design and Innovation</option>
  <option value="development">Software Development and Engineering</option>
  <option value="business">Administration & Business Management</option>
</select>

<!-- COURSE -->
<label>Course</label>
<select id="course"></select>

<!-- PROMPT -->
<textarea id="promptBox"></textarea>

<button onclick="copyPrompt()">Copy Prompt</button>
<button onclick="openAI()">Open AI 🚀</button>

</div>

<script>
const courses = {
  construction: [
    "Project Management Technology",
    "Construction Technology (AutoCAD & Civil Engineering Fundamentals)"
  ],
  design: [
    "Logo Design",
    "Visual Design",
    "Graphic Design"
  ],
  development: [
    "Frontend Development",
    "Backend Development",
    "Full Stack Development"
  ],
  business: [
    "Administration Technology",
    "Business Management",
    "Admin Technologist"
  ]
};

function loadCourses() {
  const dept = document.getElementById("department").value;
  const courseSelect = document.getElementById("course");
  courseSelect.innerHTML = "";

  courses[dept].forEach(c => {
    let opt = document.createElement("option");
    opt.textContent = c;
    courseSelect.appendChild(opt);
  });

  generatePrompt();
}

document.getElementById("course").addEventListener("change", generatePrompt);

function generatePrompt() {
  const dept = document.getElementById("department").value;
  const course = document.getElementById("course").value;

  if (!dept || !course) return;

  let details = "";

  if (dept === "construction") {
    details = "Focus on real-world construction projects, AutoCAD designs, site planning, materials, and civil engineering fundamentals.";
  }
  else if (dept === "design") {
    details = "Focus on creativity, branding, UI/UX principles, color theory, and real-world design projects.";
  }
  else if (dept === "development") {
    details = "Focus on coding, debugging, building real applications, APIs, and full project deployment.";
  }
  else {
    details = "Focus on administration systems, business strategies, management tools, and real-world case studies.";
  }

  const prompt = `
Hi AI,

I am a student at Africa Institution of Technology.

Department: ${dept.toUpperCase()}
Course: ${course}

Please teach me step-by-step for 2 weeks.

Requirements:
- ${details}
- Give practical projects
- Explain concepts clearly
- Provide real-world examples
- Help me build professional skills

Guide me until I master this field.

Powered by BlackLogic Technologies 🚀
`;

  document.getElementById("promptBox").value = prompt;
}

function copyPrompt() {
  const text = document.getElementById("promptBox");
  text.select();
  document.execCommand("copy");
  alert("Prompt copied 🚀");
}

function openAI() {
  const dept = document.getElementById("department").value;

  let url = "";

  if (dept === "business") {
    url = "https://copilot.microsoft.com/";
  }
  else if (dept === "construction" || dept === "development") {
    url = "https://chat.openai.com/";
  }
  else {
    url = "https://gemini.google.com/";
  }

  window.open(url,"_blank");
}
</script>

</body>
</html>
