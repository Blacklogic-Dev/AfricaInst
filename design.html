<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Design Studio | AIT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

/* Banner */
.banner {
  width: 100%;
  height: 250px;
  background: linear-gradient(135deg, #000, #1a0033);
  display: flex;
  align-items: center;
  justify-content: center;
}

.banner h1 {
  color: #ff4fd8;
  font-size: 2.5rem;
}

/* Container */
.container {
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
}

/* Card */
.card {
  background: #111;
  border-radius: 12px;
  border: 1px solid #ff4fd8;
  box-shadow: 0 0 20px rgba(255, 79, 216, 0.2);
  padding: 20px;
  text-align: center;
}

.card img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  margin-bottom: 15px;
}

.card h2 {
  color: #ff4fd8;
}

.card p {
  color: #ccc;
  font-size: 14px;
}

/* Button */
button {
  margin-top: 20px;
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  background: #ff4fd8;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- Banner -->
<div class="banner">
  <h1>🎨 Design Studio</h1>
</div>

<!-- Canva Only -->
<div class="container">
  <div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
    <h2>Canva Studio</h2>
    <p>Create logos, posters, presentations, and social media graphics easily.</p>
    <button onclick="window.open('https://www.canva.com/','_blank')">
      Open Canva
    </button>
  </div>
</div>

</body>
</html>
