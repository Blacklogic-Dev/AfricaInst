<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIT Attendance Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: #fff;
}

header {
  text-align: center;
  padding: 20px;
  background: linear-gradient(90deg, #000428, #004e92);
}

h1 { color: #ff4fd8; margin-bottom: 5px; }
p.note { color: #ccc; font-size: 14px; }

.container {
  max-width: 600px;
  margin: 20px auto;
  background: #11162a;
  padding: 25px;
  border-radius: 12px;
}

label { display: block; margin-top: 15px; font-size: 14px; }
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  background: #1f2a48;
  color: #fff;
  font-size: 15px;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #ff4fd8;
  color: #000;
  cursor: pointer;
}

button:hover { opacity: 0.9; }

.buttons-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 25px;
}

.buttons-group a {
  display: block;
  text-align: center;
  padding: 12px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  color: #000;
  background: #25D366;
}

.buttons-group a:hover {
  opacity: 0.9;
}
</style>
</head>
<body>

<header>
  <h1>Africa Institution of Technology</h1>
  <p class="note">All online classes are hosted through Google Meet. Links are shared on the Africa Institution WhatsApp page/group.</p>
</header>

<div class="container">
  <h2>🎓 Attendance Register</h2>

  <label>Name</label>
  <input type="text" id="name" placeholder="Full Name & Surname">

  <label>Student ID</label>
  <input type="text" id="studentId" placeholder="6-digit ID" maxlength="6">

  <label>Course</label>
  <select id="course">
    <option value="">Select Course</option>
    <option>Project Management Technology</option>
    <option>Construction Technology</option>
    <option>Logo Design</option>
    <option>Visual Design</option>
    <option>Graphic Design</option>
    <option>Frontend Development</option>
    <option>Backend Development</option>
    <option>Full Stack Development</option>
    <option>Administration Technology</option>
    <option>Business Management</option>
    <option>Admin Technologist</option>
  </select>

  <button onclick="submitAttendance()">Submit Attendance</button>

  <div class="buttons-group">
    <a href="https://chat.whatsapp.com/LGDjhKrYUBs6Nbx2BdA0my?mode=gi_t" target="_blank">
      💬 Join Africa Institution WhatsApp Group
    </a>
    <a href="https://whatsapp.com/channel/0029Vb7sIyFFsn0npbQl6s0i" target="_blank">
      📢 Follow Africa Institution Updates Channel
    </a>
  </div>
</div>

<script>
function submitAttendance() {
  const name = document.getElementById('name').value;
  const id = document.getElementById('studentId').value;
  const course = document.getElementById('course').value;

  if(!name || !id || !course) {
    alert("Please fill all fields!");
    return;
  }

  if(!/^\d{6}$/.test(id)) {
    alert("Student ID must be 6 digits!");
    return;
  }

  const msg = `🎓 AIT Attendance
Name: ${name}
ID: ${id}
Course: ${course}`;

  // Open WhatsApp link to submit
  window.open(`https://wa.me/27606614909?text=${encodeURIComponent(msg)}`, "_blank");
  alert("Attendance submitted! ✅");
}
</script>

</body>
</html>
