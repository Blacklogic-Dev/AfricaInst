<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIT Live Session</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  background: linear-gradient(90deg, #000428, #004e92);
}

h1 { color: #ff4fd8; }

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #11162a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* GRID INSTRUCTIONS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 10px;
}

.step {
  background: #1f2a48;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: none;
  background: #1f2a48;
  color: #fff;
}

button {
  background: #ff4fd8;
  border: none;
  padding: 10px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
  width: 100%;
}

.video-wrapper iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
}

.like-btn {
  border-radius: 30px;
}

.comment {
  margin: 5px 0;
  padding: 8px;
  border-radius: 6px;
}

.user { background: #1f2a48; }
.ai { background: #2b1b3d; color: #ff9cf0; }

.comments-feed {
  max-height: 200px;
  overflow-y: auto;
}
</style>
</head>

<body>

<header>
<h1>Africa Institution of Technology – LIVE</h1>
<p id="datetime"></p>
</header>

<div class="container">

<!-- GRID INSTRUCTIONS -->
<div class="card grid">
  <div class="step">1️⃣ Fill Attendance</div>
  <div class="step">2️⃣ Submit to WhatsApp</div>
  <div class="step">3️⃣ Join Live Class</div>
</div>

<!-- ATTENDANCE -->
<div class="card">
<h3>🎓 Mark Attendance</h3>

<input type="text" id="name" placeholder="Full Name & Surname">

<input type="text" id="studentId" placeholder="Student ID (6 digits)" maxlength="6">

<select id="course" onchange="setDepartment()">
<option value="">Select Course</option>
<option value="Frontend Development">Frontend Development</option>
<option value="Logo Design">Logo Design</option>
<option value="Construction Technology">Construction Technology</option>
<option value="Administration Technology">Administration Technology</option>
<option value="Business Management">Business Management</option>
</select>

<input type="text" id="department" placeholder="Department" readonly>

<button onclick="submitAttendance()">Submit Attendance</button>
</div>

<!-- JOIN BUTTON -->
<div class="card">
<button id="joinBtn" onclick="joinClass()" disabled>🎥 Join Live Class</button>
</div>

<!-- VIDEO -->
<div class="video-wrapper" id="videoSection" style="display:none;">
<iframe src="https://www.youtube.com/embed/live_stream?channel=CHANNEL_ID"></iframe>
</div>

<!-- ENGAGEMENT -->
<div class="card">
<button class="like-btn" onclick="addLike()">❤️ Like <span id="likes">0</span></button>
</div>

<!-- COMMENTS -->
<div class="card">
<div class="comments-feed" id="comments"></div>
<input type="text" id="autoComment" readonly>
<button onclick="sendComment()">Send</button>
</div>

</div>

<script>
// TIME
setInterval(() => {
  document.getElementById("datetime").innerText = new Date().toLocaleString();
}, 1000);

// COURSE → DEPT
function setDepartment() {
  const map = {
    "Frontend Development": "DEP-SD",
    "Logo Design": "DEP-DES",
    "Construction Technology": "DEP-CON",
    "Administration Technology": "DEP-ABM",
    "Business Management": "DEP-ABM"
  };

  const course = document.getElementById("course").value;
  document.getElementById("department").value = map[course] || "";
}

// SUBMIT
function submitAttendance() {
  const name = document.getElementById("name").value;
  const id = document.getElementById("studentId").value;
  const course = document.getElementById("course").value;
  const dept = document.getElementById("department").value;
  const time = new Date().toLocaleString();

  if (!name || !id || !course) {
    alert("Fill all fields");
    return;
  }

  if (!/^\d{6}$/.test(id)) {
    alert("Student ID must be exactly 6 digits");
    return;
  }

  const msg = `🎓 AIT ATTENDANCE
Name: ${name}
ID: ${id}
Course: ${course}
Department: ${dept}
Date: ${time}`;

  window.open(`https://wa.me/27606614909?text=${encodeURIComponent(msg)}`);

  // ENABLE JOIN BUTTON
  document.getElementById("joinBtn").disabled = false;
}

// JOIN CLASS
function joinClass() {
  document.getElementById("videoSection").style.display = "block";
}

// LIKE
let likes = 0;
function addLike() {
  likes++;
  document.getElementById("likes").innerText = likes;
}

// COMMENTS
const userComments = [
"🔥 Powerful lesson",
"This is deep",
"AIT 🔥",
"I understand now"
];

const aiReplies = [
"Good insight 🚀",
"Keep learning!",
"You're improving 💡"
];

function autoFill() {
  document.getElementById("autoComment").value =
    userComments[Math.floor(Math.random() * userComments.length)];
}

function sendComment() {
  const box = document.getElementById("comments");
  const text = document.getElementById("autoComment").value;

  if (!text) return;

  box.innerHTML += `<div class="comment user">${text}</div>`;

  setTimeout(() => {
    const reply = aiReplies[Math.floor(Math.random() * aiReplies.length)];
    box.innerHTML += `<div class="comment ai">🤖 ${reply}</div>`;
    box.scrollTop = box.scrollHeight;
  }, 500);

  autoFill();
}

autoFill();
</script>

</body>
</html>
